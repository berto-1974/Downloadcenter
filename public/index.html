<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Center</title>
  <script>(function(){document.documentElement.setAttribute('data-bs-theme',localStorage.getItem('theme')||'dark');})()</script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="img/logo.png" alt="Logo" height="52" class="me-3">
        <span class="navbar-title">Download Center</span>
      </a>
      <div class="d-flex gap-2">
        <button id="themeToggleBtn" class="btn btn-outline-light btn-sm" title="Dark Mode aktivieren"></button>
        <a href="/admin.html" class="btn btn-outline-light btn-sm">
          <i class="bi bi-shield-lock me-1"></i>Admin
        </a>
      </div>
    </div>
  </nav>

  <div class="container mt-5 dc-fadein">

    <!-- Passwort-Eingabe -->
    <div id="passwordSection" class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <div class="icon-circle bg-primary text-white mx-auto mb-3">
                <i class="bi bi-lock fs-2"></i>
              </div>
              <h4 class="fw-bold">Dateien abrufen</h4>
              <p class="text-muted">Geben Sie Ihr Zugangskennwort ein, um die Dateien anzuzeigen.</p>
            </div>
            <form id="passwordForm">
              <div class="mb-3">
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-key text-primary"></i></span>
                  <input type="password" id="passwordInput" class="form-control form-control-lg"
                         placeholder="Kennwort eingeben" required>
                </div>
              </div>
              <div id="passwordError" class="alert alert-danger d-none" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>Falsches Kennwort. Bitte versuchen Sie es erneut.
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">
                <span id="submitSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
                <i class="bi bi-unlock me-2" id="submitIcon"></i>Dateien anzeigen
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Dateiliste -->
    <div id="fileSection" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="fw-bold mb-1">
            <i class="bi bi-folder2-open text-primary me-2"></i>
            <span id="groupName"></span>
          </h4>
          <p class="text-muted mb-0" id="fileCount"></p>
        </div>
        <button class="btn btn-outline-secondary btn-sm" id="backBtn">
          <i class="bi bi-arrow-left me-1"></i>Zurück
        </button>
      </div>

      <!-- Bestätigungs-Modal für Löschen -->
      <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header border-0">
              <h5 class="modal-title"><i class="bi bi-trash text-danger me-2"></i>Datei löschen</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <p>Möchten Sie <strong id="deleteFileName"></strong> wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.</p>
            </div>
            <div class="modal-footer border-0">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
              <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                <i class="bi bi-trash me-1"></i>Löschen
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="fileGrid" class="row g-3"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/background.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
