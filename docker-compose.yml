services:
  downloadcenter:
    build:
      # Docker klont direkt das private GitHub-Repo (GH_TOKEN wird in Portainer gesetzt)
      context: "https://oauth2:${GH_TOKEN}@github.com/berto-1974/Downloadcenter.git#main"
    container_name: downloadcenter
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    volumes:
      - /volume1/docker/Downloadcenter/uploads:/app/uploads
      - /volume1/docker/Downloadcenter/database:/app/database
