services:
  downloadcenter:
    build:
      # Docker klont direkt das öffentliche GitHub-Repo
      context: "https://github.com/berto-1974/Downloadcenter.git#main"
    container_name: downloadcenter
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin}
      JWT_SECRET: ${JWT_SECRET:-Bitte_JWT_SECRET_ändern}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Bitte_ENCRYPTION_KEY_ändern}
      PORT: 3001
    # Einhängepunkte: Volume-Name → Pfad im Container
    volumes:
      - dlc_uploads:/app/uploads
      - dlc_database:/app/database

# Deklaration der Named Volumes (wird von Docker verwaltet).
# Für eigene Host-Pfade (z.B. NAS) die zwei Zeilen oben ersetzen durch:
#   - /dein/pfad/uploads:/app/uploads
#   - /dein/pfad/database:/app/database
# und diesen Block hier entfernen.
volumes:
  dlc_uploads:
  dlc_database:
